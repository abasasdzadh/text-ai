<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text ai</title>
    
    <!-- PWA Linkage -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <!-- آیکون جدید برنامه (مداد مشکی) در تب مرورگر -->
    <link rel="icon" type="image/png" href="icon.png" />
    
    <!-- Link modular CSS -->
    <link rel="stylesheet" href="src/css/styles.css">
    
    <!-- External Assets -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" id="prism-theme" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    
    <!-- منابع پیش‌نیاز موتور رندر فرمول‌های ریاضی KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <!-- کتابخانه مِرمید جهت رسم خودکار فلوچارت‌ها و دیاگرام‌های متنی -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar: History -->
    <aside id="sidebar" class="closed">
        <div class="sidebar-header">
            <h3 style="margin: 0; font-size: 16px;"><i class="fas fa-clock-rotate-left"></i> تاریخچه </h3>
            <button class="btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <div class="history-container" id="historyList">
            <!-- Items injected by JS -->
        </div>
        <div style="padding: 15px; border-top: 1px solid var(--border);">
            <button class="btn" style="width: 100%; justify-content: center;" onclick="clearAllHistory()">
                <i class="fas fa-trash-sweep"></i> پاکسازی کامل تاریخچه
            </button>
        </div>
    </aside>

    <!-- Main Workspace -->
    <main>
        <header>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
                <h2 style="margin: 0; font-size: 18px; color: var(--primary);">textai</h2>
            </div>
            <div class="action-group">
                <!-- دکمه جدید راست‌چین / چپ‌چین کردن تراز کلی برنامه -->
                <button class="btn" onclick="toggleDirection()" id="dirBtn"><i class="fas fa-align-left"></i></button>
                <button class="btn" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <div class="workspace">
            <div class="content-width">
                <div class="editor-container">
                    <textarea id="mainInput" placeholder="خروجی جمینای را اینجا پیست کنید..."></textarea>
                    <div class="editor-actions">
                        <div class="action-group">
                            <button class="btn" onclick="copyInput()" title="کپی کردن متن"><i class="far fa-copy"></i></button>
                            <button class="btn" onclick="pasteInput()" title="چسباندن متن"><i class="far fa-clipboard"></i></button>
                            <button class="btn" onclick="clearInput()" title="پاک کردن متن"><i class="fas fa-eraser"></i></button>
                        </div>
                        <button class="btn btn-primary" onclick="processAndSave()">
                            <i class="fas fa-bolt"></i> پردازش و نمایش
                        </button>
                    </div>
                </div>

                <div id="output" class="content-width">
                    <!-- Rendered content here -->
                </div>
            </div>
        </div>
    </main>

    <!-- لود کردن جاوااسکریپت ماژولار اصلی به عنوان ماژول ES6 -->
    <script type="module" src="src/js/main.js"></script>
</body>
</html>
