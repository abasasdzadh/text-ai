<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text ai</title>
    
    <!-- PWA Linkage -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <!-- آیکون جدید برنامه (مداد مشکی) در تب مرورگر -->
    <link rel="icon" type="image/png" href="icon.png" />
    
    <!-- Link modular CSS -->
    <link rel="stylesheet" href="src/css/styles.css">
    
    <!-- فونت فارسی Vazirmatn (محلی) -->
    <style>
        @font-face {
            font-family: 'Vazirmatn';
            src: url('assets/fonts/Vazirmatn-Regular.woff2') format('woff2'),
                 url('assets/fonts/Vazirmatn-Regular.woff') format('woff');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Vazirmatn';
            src: url('assets/fonts/Vazirmatn-Bold.woff2') format('woff2'),
                 url('assets/fonts/Vazirmatn-Bold.woff') format('woff');
            font-weight: 700;
        }
    </style>
    
    <!-- Font Awesome (محلی) -->
    <link rel="stylesheet" href="assets/vendor/font-awesome/css/font-awesome.min.css">
    
    <!-- Prism Theme (محلی) -->
    <link rel="stylesheet" id="prism-theme" href="assets/vendor/prismjs/themes/prism-tomorrow.min.css">
    
    <!-- KaTeX CSS (محلی) -->
    <link rel="stylesheet" href="assets/vendor/katex/katex.min.css">
    
    <!-- KaTeX JS (محلی) -->
    <script src="assets/vendor/katex/katex.min.js"></script>
    <script src="assets/vendor/katex/auto-render.min.js"></script>

    <!-- Marked (محلی) -->
    <script src="assets/vendor/marked/marked.min.js"></script>
    
    <!-- Prism (محلی) -->
    <script src="assets/vendor/prismjs/prism.min.js"></script>
    <script src="assets/vendor/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>
    
    <!-- Mermaid (محلی) -->
    <script src="assets/vendor/mermaid/mermaid.min.js"></script>
    
    <!-- SweetAlert2 (محلی) -->
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar: History -->
    <aside id="sidebar" class="closed">
        <div class="sidebar-header">
            <h3 style="margin: 0; font-size: 16px;"><i class="fa fa-history"></i> تاریخچه </h3>
            <button class="btn" onclick="toggleSidebar()"><i class="fa fa-times"></i></button>
        </div>
        <div class="history-container" id="historyList">
            <!-- Items injected by JS -->
        </div>
        <div style="padding: 15px; border-top: 1px solid var(--border);">
            <button class="btn" style="width: 100%; justify-content: center;" onclick="clearAllHistory()">
                <i class="fa fa-trash"></i> پاکسازی کامل تاریخچه
            </button>
        </div>
    </aside>

    <!-- Main Workspace -->
    <main>
        <header>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="mobile-toggle" onclick="toggleSidebar()"><i class="fa fa-bars"></i></div>
                <h2 style="margin: 0; font-size: 18px; color: var(--primary);">textai</h2>
            </div>
            <div class="action-group">
                <!-- دکمه جدید راست‌چین / چپ‌چین کردن تراز کلی برنامه -->
                <button class="btn" onclick="toggleDirection()" id="dirBtn"><i class="fa fa-align-left"></i></button>
                <button class="btn" onclick="toggleTheme()" id="themeBtn"><i class="fa fa-moon-o"></i></button>
            </div>
        </header>

        <div class="workspace">
            <div class="content-width">
                <div class="editor-container">
                    <textarea id="mainInput" placeholder="خروجی جمینای را اینجا پیست کنید..."></textarea>
                    <div class="editor-actions">
                        <div class="action-group">
                            <button class="btn" onclick="copyInput()" title="کپی کردن متن"><i class="fa fa-copy"></i></button>
                            <button class="btn" onclick="pasteInput()" title="چسباندن متن"><i class="fa fa-clipboard"></i></button>
                            <button class="btn" onclick="clearInput()" title="پاک کردن متن"><i class="fa fa-eraser"></i></button>
                        </div>
                        <button class="btn btn-primary" onclick="processAndSave()">
                            <i class="fa fa-bolt"></i> پردازش و نمایش
                        </button>
                    </div>
                </div>

                <div id="output" class="content-width">
                    <!-- Rendered content here -->
                </div>
            </div>
        </div>
    </main>

    <!-- لود کردن جاوااسکریپت ماژولار اصلی به عنوان ماژول ES6 -->
    <script type="module" src="src/js/main.js"></script>
</body>
</html>
