name: Build Android APK

on:
  push:
    branches: [ "main", "master" ] # در صورت نیاز نام برنچ خود را اینجا وارد کنید

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ۱. دریافت کدهای پروژه از گیت‌هاب
      - name: Checkout Source
        uses: actions/checkout@v4

      # ۲. راه‌اندازی جاوا برای بیلد اندروید
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ۳. راه‌اندازی Node.js برای ابزارهای فرانت‌اند
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ۴. نصب کتابخانه‌ها و وابستگی‌های وب پروژه
      - name: Install Dependencies
        run: npm install

      # ۵. بیلد کردن فایل‌های وب (ایجاد پوشه www با مسیرهای نسبی)
      - name: Build Web App
        run: npm run build

      # ۶. انتقال فایل‌های وب بیلد شده به داخل پوشه‌های نیتیو اندروید
      - name: Sync Capacitor
        run: npx cap sync android

      # ۷. بیلد نهایی و ساخت فایل نصب اندروید (APK)
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ۸. آپلود فایل نهایی بیلد شده جهت دانلود شما
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk