name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          # اگر فایل‌های دیگری مثل sw.js دارید این خط را فعال کنید:
          # cp sw.js www/ || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Android Platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Fix Font Scaling (Lock to 100%)
        run: |
          # مسیر فایل MainActivity با توجه به appId شما
          FILE_PATH="android/app/src/main/java/com/textai/workspace/MainActivity.java"
          
          # اضافه کردن ایمپورت WebView
          sed -i '/import com.getcapacitor.BridgeActivity;/a import android.webkit.WebView;' $FILE_PATH
          
          # تزریق کد قفل کردن زوم متن در کلاس MainActivity
          sed -i '/public class MainActivity extends BridgeActivity {}/c \
          public class MainActivity extends BridgeActivity {\
              @Override\
              public void onStart() {\
                  super.onStart();\
                  WebView webView = this.getBridge().getWebView();\
                  webView.getSettings().setTextZoom(100);\
              }\
          }' $FILE_PATH

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Text-AI-Fixed-Font-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
